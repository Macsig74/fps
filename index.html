<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <title>FPS</title>
        <style>
            * {
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            #renderCanvas {
                width: 100%;
                height: 100%;
                touch-action: none;
            }
            #crosshair {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 20px;
                height: 20px;
                pointer-events: none;
                z-index: 10;
            }
            #crosshair::before,
            #crosshair::after {
                content: "";
                position: absolute;
                background: white;
            }
            #crosshair::before {
                width: 2px;
                height: 100%;
                left: 50%;
                transform: translateX(-50%);
            }
            #crosshair::after {
                height: 2px;
                width: 100%;
                top: 50%;
                transform: translateY(-50%);
            }
        </style>
    </head>
    <!doctype html>
    <html lang="fr">
        <head>
            <meta charset="UTF-8" />
            <title>FPS</title>

            <style>
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                }

                html,
                body {
                    width: 100%;
                    height: 100%;
                    overflow: hidden;
                    background: black;
                }

                #renderCanvas {
                    width: 100%;
                    height: 100%;
                    touch-action: none;
                    display: block;
                }

                /* Crosshair */

                #crosshair {
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    width: 20px;
                    height: 20px;
                    pointer-events: none;
                    z-index: 1000;
                }

                #crosshair::before,
                #crosshair::after {
                    content: "";
                    position: absolute;
                    background: white;
                }

                #crosshair::before {
                    width: 2px;
                    height: 100%;
                    left: 50%;
                    transform: translateX(-50%);
                }

                #crosshair::after {
                    height: 2px;
                    width: 100%;
                    top: 50%;
                    transform: translateY(-50%);
                }

                /* HUD */

                #hud {
                    position: fixed;
                    bottom: 20px;
                    left: 20px;
                    z-index: 1000;
                    color: white;
                    font-family: Arial, sans-serif;
                    user-select: none;
                }

                #health-container {
                    width: 250px;
                    height: 24px;
                    border: 2px solid white;
                    background: rgba(0, 0, 0, 0.5);
                    margin-bottom: 10px;
                }

                #health-bar {
                    width: 100%;
                    height: 100%;
                    background: limegreen;
                    transition: width 0.2s ease;
                }

                #health-text,
                #ammo-count,
                #fire-mode {
                    margin-top: 5px;
                    font-size: 18px;
                    text-shadow: 1px 1px 3px black;
                }
            </style>
        </head>

        <body>
            <canvas id="renderCanvas"></canvas>

            <div id="crosshair"></div>

            <div id="hud">
                <div id="health-container">
                    <div id="health-bar"></div>
                </div>

                <div id="health-text">100 HP</div>
                <div id="ammo-count">30</div>
                <div id="fire-mode">[M] SEMI</div>
            </div>

            <script src="https://cdn.babylonjs.com/babylon.js"></script>
            <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

            <script type="module" src="dist/main.js"></script>
        </body>
    </html>
</html>
